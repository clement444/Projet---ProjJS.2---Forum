<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Nouveau post</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <div class="nav-inner">
            <a href="/" class="logo">Forum</a>
            <div class="nav-links">
                <span class="nav-user">{{.Username}}</span>
                <a href="/logout">Se déconnecter</a>
            </div>
        </div>
    </header>

    <main class="contenu">
        <div class="form-card">
            <h1 style="font-size:22px; font-weight:600; margin-bottom:24px;">Créer un post</h1>

            {{if .Error}}
                <div class="msg-erreur">{{.Error}}</div>
            {{end}}

            <form method="POST" action="/post/create" enctype="multipart/form-data">
                <div class="form-groupe">
                    <label for="title">Titre</label>
                    <input type="text" id="title" name="title" required>
                </div>

                <div class="form-groupe">
                    <label for="content">Contenu</label>
                    <textarea id="content" name="content" rows="8" required></textarea>
                </div>

                <div class="form-groupe">
                    <fieldset>
                        <legend>Catégories (au moins une)</legend>
                        {{range .Categories}}
                            <label>
                                <input type="checkbox" name="categories" value="{{.ID}}">
                                {{.Name}}
                            </label>
                        {{end}}
                    </fieldset>
                </div>

                <div class="form-groupe">
                    <label for="image">Image (optionnelle)</label>
                    <input type="file" id="image" name="image" accept="image/*">
                </div>

                <div style="display:flex; gap:12px; align-items:center;">
                    <button type="submit" class="btn-bleu">Publier</button>
                    <a href="/" class="btn-gris">Annuler</a>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
